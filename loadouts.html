<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>改枪码 - 跑刀鼠鼠</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ===== 游戏内风格附加样式 ===== */
        
        /* 评分大字 */
        .score-big {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF6347 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        
        .score-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* 标签 */
        .tag-game {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 2px;
        }
        .tag-game.tag-hot { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .tag-game.tag-new { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .tag-game.tag-spd { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
        .tag-game.tag-rec { background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }
        .tag-game.tag-def { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .tag-game.tag-def2 { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
        .tag-game.tag-def3 { background: rgba(14,165,233,0.15); color: #38bdf8; border: 1px solid rgba(14,165,233,0.3); }
        .tag-game.tag-def4 { background: rgba(236,72,153,0.15); color: #f472b6; border: 1px solid rgba(236,72,153,0.3); }
        .tag-game.tag-def5 { background: rgba(20,184,166,0.15); color: #2dd4bf; border: 1px solid rgba(20,184,166,0.3); }

        /* 改枪码框 */
        .code-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 10px;
            padding: 12px 16px;
            margin: 16px 0;
        }
        .code-text {
            font-family: 'Courier New', monospace;
            font-size: 15px;
            font-weight: 700;
            color: #a5b4fc;
            letter-spacing: 0.5px;
            flex: 1;
            word-break: break-all;
        }
        .code-copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .code-copy-btn:hover { background: var(--primary-dark); }
        .code-copy-btn.copied { background: #22c55e; }

        /* 属性表 */
        .stats-table {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0;
            background: var(--dark);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--dark-light);
        }
        .stats-row {
            display: contents;
        }
        .stats-name {
            padding: 10px 16px;
            font-size: 14px;
            color: var(--text);
            border-bottom: 1px solid var(--dark-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats-value {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            border-bottom: 1px solid var(--dark-light);
            text-align: right;
        }
        .stat-change { font-size: 12px; margin-left: 4px; }
        .stat-change.positive { color: #22c55e; }
        .stat-change.negative { color: #ef4444; }
        .stat-change.neutral { color: var(--text-muted); }

        /* 配件网格 */
        .attach-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .attach-item {
            background: var(--dark);
            border: 1px solid var(--dark-light);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .attach-icon { font-size: 24px; margin-bottom: 6px; }
        .attach-slot { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
        .attach-name { font-size: 13px; font-weight: 600; }

        /* 武器展示区 */
        .weapon-showcase {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1a1a2e 100%);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .weapon-showcase::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(99,102,241,0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .weapon-img-placeholder {
            width: 140px; height: 80px;
            background: rgba(99,102,241,0.1);
            border-radius: 12px;
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            border: 1px solid rgba(99,102,241,0.2);
        }
        .weapon-showcase-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* 列表样式 */
        .loadout-list-item {
            background: var(--bg-card);
            border: 1px solid var(--dark-light);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 16px;
            align-items: center;
        }
        .loadout-list-item:hover {
            border-color: var(--primary);
            background: rgba(99,102,241,0.05);
            transform: translateX(4px);
        }
        .loadout-list-info h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .loadout-list-info .author {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--dark-light);
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--dark-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .modal-close:hover { background: var(--dark); color: var(--text); }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--dark-light);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .modal-section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-section-title::before {
            content: '';
            width: 3px; height: 14px;
            background: var(--primary);
            border-radius: 2px;
        }

        .action-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btns .btn { flex: 1; justify-content: center; min-width: 120px; }

        /* 登录状态栏 */
        .auth-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--dark-light);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .auth-bar.logged-in {
            background: rgba(34,197,94,0.05);
            border-color: rgba(34,197,94,0.2);
        }
        .auth-bar.logged-out {
            background: rgba(245,158,11,0.05);
            border-color: rgba(245,158,11,0.2);
        }
        .auth-status {
            font-size: 14px;
            flex: 1;
        }
        .auth-status .username {
            font-weight: 600;
            color: #22c55e;
        }
        
        /* Token 输入框 */
        .token-input-group {
            display: flex;
            gap: 8px;
            flex: 1;
        }
        .token-input-group input {
            flex: 1;
            padding: 8px 12px;
            background: var(--dark);
            border: 1px solid var(--dark-light);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
        }
        .token-input-group input::placeholder {
            color: var(--text-muted);
        }
        
        /* 保存中状态 */
        .saving-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
        }
        .saving-overlay.active { display: flex; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--dark-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 只读提示 */
        .readonly-notice {
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <span class="logo-icon">🐭</span>
                <span class="logo-text">跑刀鼠鼠</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="maps.html" class="nav-link">地图点位</a>
                <a href="loadouts.html" class="nav-link active">改枪码</a>
                <a href="weapons.html" class="nav-link">枪械图鉴</a>
            </nav>
        </div>
    </header>

    <div class="container" style="padding: 40px 20px 60px; max-width: 900px;">
        <div style="padding: 0 0 32px 0;">
            <h1 class="page-title">🔧 改枪码</h1>
            <p class="page-subtitle">搭配详情 · 评分 · 改枪码一键复制</p>
        </div>

        <!-- 登录状态栏 -->
        <div class="auth-bar logged-out" id="authBar">
            <span class="auth-status" id="authStatus">🔒 未登录 - 只能浏览，无法添加或编辑</span>
            <div class="token-input-group" id="tokenInputGroup">
                <input type="password" id="githubToken" placeholder="输入 GitHub Token 以启用编辑功能...">
                <button class="btn btn-primary" onclick="login()" style="padding: 8px 16px; font-size: 13px;">登录</button>
            </div>
            <button class="btn btn-secondary" id="logoutBtn" onclick="logout()" style="display:none; padding: 8px 16px; font-size: 13px;">退出</button>
        </div>

        <div class="search-filter-bar">
            <div class="search-box" style="flex: 1;">
                <input type="text" id="searchInput" placeholder="搜索武器名、标签或作者..." oninput="filterLoadouts()">
            </div>
            <button class="btn btn-primary" id="addBtn" onclick="openAddModal()" disabled style="opacity: 0.5;">
                <span>+</span> 添加配置
            </button>
        </div>

        <div id="loadoutList"></div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal" style="max-width: 640px; position: relative;">
            <div class="saving-overlay" id="savingOverlay">
                <div class="spinner"></div>
                <p style="color: var(--text-muted);">正在保存到 GitHub...</p>
            </div>
            <div class="modal-header">
                <h3 class="modal-title">配置详情</h3>
                <button class="modal-close" onclick="closeDetailModal()">×</button>
            </div>
            <div class="modal-body" id="detailBody"></div>
            <div class="modal-footer" id="detailFooter"></div>
        </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal-overlay" id="loadoutModal">
        <div class="modal" style="position: relative;">
            <div class="saving-overlay" id="editSavingOverlay">
                <div class="spinner"></div>
                <p style="color: var(--text-muted);">正在保存到 GitHub...</p>
            </div>
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加改枪码</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="loadoutForm">
                    <input type="hidden" id="loadoutId">
                    <div class="form-group">
                        <label class="form-label">配置名称 *</label>
                        <input type="text" class="form-input" id="loadoutName" placeholder="例如：SVCH消音高初速满改版" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">选择枪械 *</label>
                            <select class="form-input" id="weaponSelect" required>
                                <option value="">请选择</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">改枪码 *</label>
                            <input type="text" class="form-input" id="loadoutCode" placeholder="~开头，复制游戏内码" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">评分</label>
                            <input type="number" class="form-input" id="loadoutScore" placeholder="如：462.4" step="0.1">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">作者</label>
                            <input type="text" class="form-input" id="loadoutAuthor" placeholder="你的名字">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">标签（逗号分隔）</label>
                        <input type="text" class="form-input" id="loadoutTags" placeholder="如：满改神器,新武器,射速消音">
                    </div>
                    <div class="form-group">
                        <label class="form-label">简介描述</label>
                        <input type="text" class="form-input" id="loadoutDesc" placeholder="一句话描述这套配置的特点">
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注</label>
                        <textarea class="form-input" id="loadoutNotes" rows="3" placeholder="详细的使用说明、适用场景..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveLoadout()">保存配置</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>跑刀鼠鼠 · 三角洲行动攻略工具</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            OWNER: 'wuchen95279',
            REPO: 'paodao-shushu',
            FILE_PATH: 'data/loadouts.json'
        };

        // ==================== 状态 ====================
        let loadoutsData = null;
        let weaponsData = null;
        let currentDetailId = null;
        let githubToken = localStorage.getItem('github_token') || '';
        let isLoggedIn = false;

        const TAG_COLORS = ['tag-hot','tag-new','tag-spd','tag-rec','tag-def','tag-def2','tag-def3','tag-def4','tag-def5'];
        const SLOT_ICONS = {
            '枪口':'🔇','枪管':'🔧','护木':'🛡️','前握把':'✋','上机匣':'📐',
            '瞄具座':'🔭','后握把':'🤛','弹匣':'📦','枪托':'🦴','后托':'✋',
            '贴腮板':'🧱','瞄具':'🔭'
        };

        // ==================== 初始化 ====================
        async function init() {
            // 检查登录状态
            checkAuth();
            
            // 加载数据
            [loadoutsData, weaponsData] = await Promise.all([
                appUtils.loadJSON('data/loadouts.json'),
                appUtils.loadJSON('data/weapons.json')
            ]);
            
            if (!loadoutsData || !weaponsData) {
                appUtils.showToast('加载数据失败', 'error');
                return;
            }
            
            renderLoadouts();
            populateWeaponSelect();
        }

        // ==================== 认证 ====================
        function checkAuth() {
            const token = localStorage.getItem('github_token');
            if (token) {
                githubToken = token;
                isLoggedIn = true;
                updateAuthUI();
            }
        }

        async function login() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) {
                appUtils.showToast('请输入 GitHub Token', 'error');
                return;
            }

            // 验证 token
            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    githubToken = token;
                    isLoggedIn = true;
                    localStorage.setItem('github_token', token);
                    localStorage.setItem('github_user', user.login);
                    updateAuthUI();
                    appUtils.showToast(`欢迎，${user.login}！`, 'success');
                } else {
                    appUtils.showToast('Token 无效或已过期', 'error');
                }
            } catch (e) {
                appUtils.showToast('验证失败，请检查网络', 'error');
            }
        }

        function logout() {
            githubToken = '';
            isLoggedIn = false;
            localStorage.removeItem('github_token');
            localStorage.removeItem('github_user');
            updateAuthUI();
            appUtils.showToast('已退出登录', 'success');
        }

        function updateAuthUI() {
            const authBar = document.getElementById('authBar');
            const authStatus = document.getElementById('authStatus');
            const tokenInputGroup = document.getElementById('tokenInputGroup');
            const logoutBtn = document.getElementById('logoutBtn');
            const addBtn = document.getElementById('addBtn');

            if (isLoggedIn) {
                const username = localStorage.getItem('github_user') || '用户';
                authBar.className = 'auth-bar logged-in';
                authStatus.innerHTML = `✅ 已登录 - <span class="username">${username}</span> 可以添加和编辑改枪码`;
                tokenInputGroup.style.display = 'none';
                logoutBtn.style.display = 'block';
                addBtn.disabled = false;
                addBtn.style.opacity = '1';
            } else {
                authBar.className = 'auth-bar logged-out';
                authStatus.textContent = '🔒 未登录 - 只能浏览，无法添加或编辑';
                tokenInputGroup.style.display = 'flex';
                logoutBtn.style.display = 'none';
                addBtn.disabled = true;
                addBtn.style.opacity = '0.5';
            }
        }

        // ==================== GitHub API 操作 ====================
        async function getFileSHA() {
            const response = await fetch(
                `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${CONFIG.FILE_PATH}`,
                { headers: { 'Authorization': `token ${githubToken}` } }
            );
            if (response.ok) {
                const data = await response.json();
                return data.sha;
            }
            return null;
        }

        async function saveToGitHub() {
            if (!isLoggedIn) {
                appUtils.showToast('请先登录', 'error');
                return false;
            }

            try {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(loadoutsData, null, 2))));
                const sha = await getFileSHA();
                
                const payload = {
                    message: `Update loadouts.json - ${new Date().toISOString()}`,
                    content: content
                };
                if (sha) payload.sha = sha;

                const response = await fetch(
                    `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${CONFIG.FILE_PATH}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    }
                );

                if (response.ok) {
                    return true;
                } else {
                    const error = await response.json();
                    appUtils.showToast(`保存失败: ${error.message}`, 'error');
                    return false;
                }
            } catch (e) {
                appUtils.showToast('保存失败，请检查网络', 'error');
                return false;
            }
        }

        // ==================== 渲染 ====================
        function getWeaponName(weaponId) {
            for (const cat of weaponsData.categories) {
                const w = cat.weapons.find(w => w.id === weaponId);
                if (w) return w.name;
            }
            return weaponId;
        }

        function getTagClass(tag) {
            const t = tag.toLowerCase();
            if (t.includes('新') || t.includes('新武器')) return 'tag-new';
            if (t.includes('爆') || t.includes('hot') || t.includes('爆发')) return 'tag-hot';
            if (t.includes('射速') || t.includes('速度') || t.includes('spd')) return 'tag-spd';
            if (t.includes('推荐') || t.includes('新手') || t.includes('rec')) return 'tag-rec';
            return TAG_COLORS[Math.abs(hashCode(tag)) % TAG_COLORS.length];
        }

        function hashCode(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i);
            return h;
        }

        function renderLoadouts(filter = '') {
            const container = document.getElementById('loadoutList');
            const fl = filter.toLowerCase();
            const filtered = loadoutsData.loadouts.filter(lo => {
                if (!fl) return true;
                return lo.name.toLowerCase().includes(fl) ||
                       lo.weaponId.toLowerCase().includes(fl) ||
                       getWeaponName(lo.weaponId).toLowerCase().includes(fl) ||
                       (lo.author && lo.author.toLowerCase().includes(fl)) ||
                       (lo.tags && lo.tags.some(t => t.toLowerCase().includes(fl)));
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
                        <div style="font-size:48px;margin-bottom:16px;">🔧</div>
                        <p>${filter ? '没有找到匹配的改枪码' : '还没有改枪码，登录后添加第一个！'}</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(lo => `
                <div class="loadout-list-item" onclick="showDetail('${lo.id}')">
                    <div class="loadout-list-info">
                        <h3>${lo.name}</h3>
                        <div class="author">🎯 ${getWeaponName(lo.weaponId)} · 👤 ${lo.author || '匿名'}</div>
                        <div>${(lo.tags||[]).map(t => `<span class="tag-game ${getTagClass(t)}">${t}</span>`).join('')}</div>
                    </div>
                    <div style="text-align:center;min-width:80px;">
                        <div class="score-big">${lo.score || '?'}</div>
                        <div class="score-label">评分</div>
                    </div>
                    <div style="text-align:right;font-size:20px;">→</div>
                </div>
            `).join('');
        }

        function filterLoadouts() {
            renderLoadouts(document.getElementById('searchInput').value);
        }

        // ==================== 详情弹窗 ====================
        function showDetail(id) {
            currentDetailId = id;
            const lo = loadoutsData.loadouts.find(l => l.id === id);
            if (!lo) return;

            const weaponName = getWeaponName(lo.weaponId);

            // 改枪码复制
            const codeCopyBtn = lo.code ? `
                <button class="code-copy-btn" id="codeCopyBtn" onclick="copyCode('${lo.code.replace(/'/g,"\\'")}')">📋 复制</button>` : '';

            // 配件网格
            const attachGrid = (lo.attachments && lo.attachments.length > 0)
                ? `<div class="attach-grid">${lo.attachments.map(a => `
                    <div class="attach-item">
                        <span class="attach-icon">${a.icon || SLOT_ICONS[a.slot] || '🔧'}</span>
                        <div class="attach-info">
                            <div class="attach-slot">${a.slot}</div>
                            <div class="attach-name">${a.name}</div>
                        </div>
                    </div>`).join('')}</div>`
                : '<p style="color:var(--text-muted);font-size:14px;">暂无配件信息</p>';

            // 属性表
            const statsTable = (lo.stats && Object.keys(lo.stats).length > 0)
                ? `<div class="stats-table">${Object.entries(lo.stats).map(([name, s]) => {
                    const ch = s.change || 0;
                    const chClass = ch > 0 ? 'positive' : ch < 0 ? 'negative' : 'neutral';
                    const chText = ch > 0 ? `+${ch}` : ch === 0 ? '±0' : `${ch}`;
                    return `<div class="stats-row">
                        <div class="stats-name">${name}</div>
                        <div class="stats-value">
                            ${s.base}
                            <span class="stat-change ${chClass}">(${chText})</span>
                        </div>
                    </div>`;
                }).join('')}</div>`
                : '';

            document.getElementById('detailBody').innerHTML = `
                <!-- 武器大图区 -->
                <div class="weapon-showcase">
                    <div class="weapon-img-placeholder">${weaponName.charAt(0)}</div>
                    <div class="weapon-showcase-name">${lo.name}</div>
                    ${lo.score ? `<div class="score-big">${lo.score}</div><div class="score-label">评分</div>` : ''}
                </div>

                <!-- 标签 -->
                <div>${(lo.tags||[]).map(t => `<span class="tag-game ${getTagClass(t)}">${t}</span>`).join('')}</div>

                <!-- 作者 -->
                <div style="margin-top:12px;font-size:13px;color:var(--text-muted);">
                    👤 ${lo.author || '匿名'} · 📅 ${lo.createdAt || ''}
                </div>

                <!-- 简介 -->
                ${lo.description ? `<p style="margin-top:12px;font-size:14px;color:var(--text-muted);line-height:1.7;">${lo.description}</p>` : ''}

                <!-- 改枪码 -->
                ${lo.code ? `
                <div class="modal-section-title">改枪码</div>
                <div class="code-box">
                    <span class="code-text">${lo.code}</span>
                    ${codeCopyBtn}
                </div>` : ''}

                <!-- 配件 -->
                <div class="modal-section-title">配件搭配</div>
                ${attachGrid}

                <!-- 属性 -->
                ${statsTable ? `<div class="modal-section-title">改装属性</div>${statsTable}` : ''}

                <!-- 备注 -->
                ${lo.notes ? `
                <div class="modal-section-title">备注</div>
                <p style="font-size:14px;color:var(--text-muted);line-height:1.7;">${lo.notes}</p>` : ''}
            `;

            // 根据登录状态显示不同按钮
            if (isLoggedIn) {
                document.getElementById('detailFooter').innerHTML = `
                    <div class="action-btns">
                        ${lo.code ? `<button class="btn btn-primary" onclick="copyCode('${lo.code.replace(/'/g,"\\'")}')">📋 复制改枪码</button>` : ''}
                        <button class="btn btn-secondary" onclick="editCurrentLoadout()">✏️ 编辑</button>
                        <button class="btn btn-danger" onclick="deleteCurrentLoadout()">🗑️ 删除</button>
                    </div>
                `;
            } else {
                document.getElementById('detailFooter').innerHTML = `
                    <div class="readonly-notice">
                        <span>ℹ️</span>
                        <span>登录后可以编辑或删除此配置</span>
                    </div>
                    <div class="action-btns">
                        ${lo.code ? `<button class="btn btn-primary" onclick="copyCode('${lo.code.replace(/'/g,"\\'")}')">📋 复制改枪码</button>` : ''}
                        <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
                    </div>
                `;
            }

            document.getElementById('detailModal').classList.add('active');
        }

        function copyCode(code) {
            appUtils.copyToClipboard(code);
            const btn = document.getElementById('codeCopyBtn');
            if (btn) { btn.textContent = '✅ 已复制'; btn.classList.add('copied'); setTimeout(() => { btn.textContent='📋 复制'; btn.classList.remove('copied'); }, 1500); }
        }

        function closeDetailModal() { document.getElementById('detailModal').classList.remove('active'); }

        // ==================== 编辑功能 ====================
        function editCurrentLoadout() {
            if (!isLoggedIn) {
                appUtils.showToast('请先登录', 'error');
                return;
            }
            const lo = loadoutsData.loadouts.find(l => l.id === currentDetailId);
            if (!lo) return;
            closeDetailModal();
            openEditModal(lo);
        }

        function openEditModal(lo) {
            document.getElementById('modalTitle').textContent = '编辑改枪码';
            document.getElementById('loadoutId').value = lo.id;
            document.getElementById('loadoutName').value = lo.name;
            document.getElementById('weaponSelect').value = lo.weaponId;
            document.getElementById('loadoutCode').value = lo.code || '';
            document.getElementById('loadoutScore').value = lo.score || '';
            document.getElementById('loadoutAuthor').value = lo.author || '';
            document.getElementById('loadoutTags').value = (lo.tags||[]).join(',');
            document.getElementById('loadoutDesc').value = lo.description || '';
            document.getElementById('loadoutNotes').value = lo.notes || '';
            document.getElementById('loadoutModal').classList.add('active');
        }

        async function deleteCurrentLoadout() {
            if (!isLoggedIn) {
                appUtils.showToast('请先登录', 'error');
                return;
            }
            if (!confirm('确定要删除这个改枪码吗？')) return;
            
            document.getElementById('savingOverlay').classList.add('active');
            
            const idx = loadoutsData.loadouts.findIndex(l => l.id === currentDetailId);
            if (idx !== -1) {
                loadoutsData.loadouts.splice(idx, 1);
                const success = await saveToGitHub();
                if (success) {
                    renderLoadouts();
                    closeDetailModal();
                    appUtils.showToast('已删除', 'success');
                }
            }
            
            document.getElementById('savingOverlay').classList.remove('active');
        }

        // ==================== 添加功能 ====================
        function populateWeaponSelect() {
            const sel = document.getElementById('weaponSelect');
            let opts = '<option value="">请选择</option>';
            weaponsData.categories.forEach(cat => {
                opts += `<optgroup label="${cat.icon} ${cat.name}">`;
                cat.weapons.forEach(w => { opts += `<option value="${w.id}">${w.name} - ${w.fullName}</option>`; });
                opts += '</optgroup>';
            });
            sel.innerHTML = opts;
        }

        function openAddModal() {
            if (!isLoggedIn) {
                appUtils.showToast('请先登录', 'error');
                return;
            }
            document.getElementById('modalTitle').textContent = '添加改枪码';
            document.getElementById('loadoutForm').reset();
            document.getElementById('loadoutId').value = '';
            document.getElementById('loadoutModal').classList.add('active');
        }

        function closeModal() { document.getElementById('loadoutModal').classList.remove('active'); }

        async function saveLoadout() {
            if (!isLoggedIn) {
                appUtils.showToast('请先登录', 'error');
                return;
            }

            const form = document.getElementById('loadoutForm');
            if (!form.checkValidity()) { form.reportValidity(); return; }

            document.getElementById('editSavingOverlay').classList.add('active');

            const loadout = {
                id: document.getElementById('loadoutId').value || appUtils.generateId(),
                weaponId: document.getElementById('weaponSelect').value,
                name: document.getElementById('loadoutName').value.trim(),
                code: document.getElementById('loadoutCode').value.trim(),
                score: parseFloat(document.getElementById('loadoutScore').value) || 0,
                author: document.getElementById('loadoutAuthor').value.trim() || localStorage.getItem('github_user') || '匿名',
                tags: document.getElementById('loadoutTags').value.split(',').map(t=>t.trim()).filter(t=>t),
                description: document.getElementById('loadoutDesc').value.trim(),
                notes: document.getElementById('loadoutNotes').value.trim(),
                createdAt: appUtils.formatDate(new Date()),
                attachments: [],
                stats: {}
            };

            const existing = loadoutsData.loadouts.findIndex(l => l.id === loadout.id);
            if (existing !== -1) loadoutsData.loadouts[existing] = loadout;
            else loadoutsData.loadouts.unshift(loadout);

            const success = await saveToGitHub();
            
            document.getElementById('editSavingOverlay').classList.remove('active');
            
            if (success) {
                renderLoadouts();
                closeModal();
                appUtils.showToast('保存成功！', 'success');
            }
        }

        // ==================== 启动 ====================
        init();

        // 点击外部关闭
        document.getElementById('detailModal').addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeDetailModal(); });
        document.getElementById('loadoutModal').addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(); });
    </script>
</body>
</html>
